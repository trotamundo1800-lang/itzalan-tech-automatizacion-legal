server {
  listen 80;
  server_name itzalan.com www.itzalan.com api.itzalan.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name itzalan.com www.itzalan.com;

  ssl_certificate /etc/letsencrypt/live/itzalan.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/itzalan.com/privkey.pem;

  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 443 ssl http2;
  server_name api.itzalan.com;

  ssl_certificate /etc/letsencrypt/live/itzalan.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/itzalan.com/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
