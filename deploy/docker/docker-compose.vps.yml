version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itzalan

  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      PORT: 3001
    depends_on:
      - postgres
    expose:
      - "3001"
    networks:
      - itzalan

  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    expose:
      - "3000"
    networks:
      - itzalan

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/itzalan.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    networks:
      - itzalan

networks:
  itzalan:
    driver: bridge

volumes:
  postgres_data:
  certbot-www:
