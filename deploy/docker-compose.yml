version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: itzalan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  api:
    build:
      context: ./
      dockerfile: deploy/docker/Dockerfile.api
    container_name: itzalan-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
    expose:
      - '3001'

  web:
    build:
      context: ./
      dockerfile: deploy/docker/Dockerfile.web
    container_name: itzalan-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
    expose:
      - '3000'

  nginx:
    image: nginx:1.27-alpine
    container_name: itzalan-nginx
    restart: unless-stopped
    profiles: ['nginx']
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/itzalan.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot

volumes:
  postgres-data:
  certbot-www:
