name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Web typecheck
        run: npm --workspace @itzalan/web run typecheck

      - name: Web tests
        run: npm --workspace @itzalan/web run test

      - name: Web build
        run: npm --workspace @itzalan/web run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Mobile typecheck
        run: npm --workspace @itzalan/mobile run typecheck

      - name: Mobile tests
        run: npm --workspace @itzalan/mobile run test

      - name: Mobile build
        run: npm --workspace @itzalan/mobile run build

  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '24']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Start API (background, log to file)
        run: npm --workspace @itzalan/api run dev > apps/api/api.log 2>&1 &

      - name: Wait for API
        run: npm exec --yes --package wait-on -- wait-on http://localhost:3001 --timeout 10000

      - name: Run E2E tests (save output)
        run: npm --workspace @itzalan/api run test:e2e 2>&1 | tee apps/api/e2e.log

      - name: Prepare logs artifact
        run: |
          mkdir -p artifacts
          cp apps/api/e2e.log artifacts/ || true
          cp apps/api/api.log artifacts/ || true
          zip -r artifacts/e2e-logs-${{ matrix.node-version }}-${{ github.run_id }}-${{ github.sha }}.zip artifacts || true

      - name: Upload E2E + API logs (main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.node-version }}-${{ github.run_id }}
          path: artifacts/e2e-logs-${{ matrix.node-version }}-${{ github.run_id }}-${{ github.sha }}.zip
          retention-days: 7

      - name: Upload E2E + API logs (pull request)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-pr-${{ matrix.node-version }}-${{ github.run_id }}
          path: artifacts/e2e-logs-${{ matrix.node-version }}-${{ github.run_id }}-${{ github.sha }}.zip
          retention-days: 1
